spring.application.name=category-service
server.port=8770

# Config Server ba?lant?s?
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}

# Profil (local / docker)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Management / Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Di?er
spring.main.allow-bean-definition-overriding=true
spring.cloud.compatibility-verifier.enabled=false

# Local fallback DB config
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${CATEGORY_DB_NAME:category_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
