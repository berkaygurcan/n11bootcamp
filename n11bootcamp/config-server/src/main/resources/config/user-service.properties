server.port=8766

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/n11bootcamp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT config
jwt.grant_type=client_credentials
jwt.scope=openid offline_access
jwt.issuer_uri=${JWT_ISSUER_URI:http://localhost:8080/realms/microservice-realm/protocol/openid-connect/token}
jwt.client_id=user-service
jwt.client_secret=${JWT_CLIENT_SECRET:wisI6vNCYA1dZFezCkRgWeRjNHPlWdY8}
